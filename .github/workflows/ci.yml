name: CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-tests:
    name: Backend tests (Jest)
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      MONGO_URI: mongodb://127.0.0.1:27017/ku_credit_ci
      JWT_SECRET: test-secret
      DATABASE_URL: postgresql://user:password@127.0.0.1:5432/testdb
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build

      - name: Run backend tests
        run: npm test

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  deploy-backend:
    name: Deploy Backend to VPS
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_PROJECT_PATH: ${{ secrets.VPS_PROJECT_PATH }}
    steps:
      - name: Skip deploy when VPS secrets are missing
        if: env.VPS_HOST == ''
        run: echo "Skipping deploy-backend: missing VPS_HOST/VPS_USER/VPS_SSH_KEY secrets."

      - name: Skip deploy when VPS user is missing
        if: env.VPS_USER == ''
        run: echo "Skipping deploy-backend: missing VPS_HOST/VPS_USER/VPS_SSH_KEY secrets."

      - name: Skip deploy when VPS SSH key is missing
        if: env.VPS_SSH_KEY == ''
        run: echo "Skipping deploy-backend: missing VPS_HOST/VPS_USER/VPS_SSH_KEY secrets."

      - name: Deploy via SSH
        if: env.VPS_HOST != '' && env.VPS_USER != '' && env.VPS_SSH_KEY != ''
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          port: ${{ env.VPS_PORT }}
          script: |
            PROJECT_PATH="${VPS_PROJECT_PATH:-~/CollegeEnrollmentPlatform}"
            cd "$PROJECT_PATH"
            bash deploy.sh
